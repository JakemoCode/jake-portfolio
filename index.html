<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="I build and fix websites for small businesses and people with something to share. Modern, fast, and yours to keep." />

    <!-- Open Graph / link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jakemosher.dev/" />
    <meta property="og:title" content="Jake Mosher · Crafted websites" />
    <meta property="og:description" content="I build and fix websites for small businesses and people with something to share. Modern, fast, and yours to keep." />
    <meta property="og:image" content="https://jakemosher.dev/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Jake Mosher: crafted websites, built and fixed." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jake Mosher · Crafted websites" />
    <meta name="twitter:description" content="Websites built and fixed for small businesses and people with something to share." />
    <meta name="twitter:image" content="https://jakemosher.dev/og-card.png" />
    <script>
      // Prevent theme flicker; runs before React hydrates.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <title>Jake Mosher · Crafted websites</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
